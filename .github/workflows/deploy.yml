name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Typecheck needs env vars *declared* (not set) so svelte-kit sync can
      # emit the correct types for `$env/static/private`. `.env.example` is
      # the committed schema and is sufficient.
      - name: Seed env from .env.example
        run: cp .env.example .env

      - name: Typecheck
        run: pnpm run check

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy env file
        run: cp /home/exedev/ll/.env .env

      - name: Build
        run: docker compose -p ll build

      - name: Deploy
        run: docker compose -p ll up -d
