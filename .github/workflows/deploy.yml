name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy env file
        run: cp /home/exedev/ll/.env .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy build artifacts
        run: rsync -a --delete build/ /home/exedev/ll/build/

      - name: Deploy dependencies
        run: rsync -a --delete node_modules/ /home/exedev/ll/node_modules/

      - name: Apply schema changes
        run: cd /home/exedev/ll && pnpm drizzle-kit push --force

      - name: Restart service
        run: sudo systemctl restart ll
