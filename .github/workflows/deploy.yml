name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy env file
        run: cp /home/exedev/ll/.env .env

      - name: Build
        run: docker compose -p ll build

      - name: Deploy
        run: docker compose -p ll up -d
